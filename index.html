<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>字母大對戰 - 語音切換最終版</title>
    <style>
        :root {
            --primary-color: #FF7F50;
            --p1-color: #87CEEB; 
            --p2-color: #FF69B4; 
            --bg-color: #FFF8DC;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 10px;
            user-select: none; overflow-x: hidden;
        }

        h1 { text-align: center; color: #555; font-size: 24px; margin-bottom: 5px; }
        h2 { text-align: center; margin-top: 5px; margin-bottom: 5px; font-size: 18px; }

        .btn { cursor: pointer; border-radius: 20px; font-weight: bold; transition: all 0.2s; border: none; }

        /* 設定區塊通用樣式 */
        .setup-section {
            background: white; border-radius: 20px; padding: 10px;
            max-width: 600px; margin: 0 auto 15px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 第一部分：字母選擇 */
        .quick-actions { text-align: center; margin-bottom: 10px; }
        .quick-btn { font-size: 12px; padding: 6px 12px; margin: 0 3px; background-color: #ddd; border: 1px solid #ccc; }
        #letter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(40px, 1fr)); gap: 8px; }
        .letter-btn { font-size: 20px; padding: 8px 0; border: 3px solid #ccc; background-color: #f9f9f9; color: #ccc; }
        .letter-btn.selected { background-color: #90EE90; border-color: #32CD32; color: #006400; }

        /* 第二部分：語音模式切換 */
        .mode-container { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .mode-btn { font-size: 16px; padding: 10px 20px; border: 3px solid #ccc; background-color: #f9f9f9; color: #888; }
        .mode-btn.selected { background-color: #FFD700; border-color: #DAA520; color: #333; }

        /* 第三部分：玩家選角介面 */
        #character-selection-section {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            max-width: 1200px; margin: 0 auto;
        }
        .player-setup-box {
            flex: 1; min-width: 300px; border-radius: 20px; padding: 10px;
            background: rgba(255,255,255,0.8); box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative;
        }
        .player1-box { border: 5px solid var(--p1-color); }
        .player2-box { border: 5px solid var(--p2-color); }
        
        .character-preview {
            width: 120px; height: 120px; background: #eee; border-radius: 10px;
            margin: 5px auto; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 2px solid #ccc; position: relative;
        }
        
        #p2-preview.has-character #p2-sprite { transform: scaleX(-1); }
        #p2-preview #p2-sprite[src=""], #p2-preview::after { transform: none !important; }

        .sprite-idle {
            width: 120px; height: 120px; background-repeat: no-repeat;
            background-size: 300% 300%; background-position: 0% 0%; image-rendering: pixelated; 
        }

        .char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 10px; }
        .char-item {
            cursor: pointer; border: 2px solid transparent; border-radius: 5px; overflow: hidden;
            background: white; padding: 0; aspect-ratio: 1 / 1; transition: all 0.2s; position: relative;
        }
        .char-item .sprite-idle-mini {
            width: 100%; height: 100%; background-repeat: no-repeat; background-size: 300% 300%;
            background-position: 0% 0%; image-rendering: pixelated;
        }

        #p2-char-grid .sprite-idle-mini { transform: scaleX(-1); }
        .player1-box .char-item.selected { border-color: var(--p1-color); box-shadow: 0 0 8px rgba(135,206,235,0.7); }
        .player2-box .char-item.selected { border-color: var(--p2-color); box-shadow: 0 0 8px rgba(255,105,180,0.7); }

        .bottom-actions { text-align: center; margin-top: 20px; margin-bottom: 20px; }
        #start-battle-btn {
            font-size: 24px; padding: 12px 50px; background-color: var(--primary-color);
            color: white; box-shadow: 0 5px 0 #CD5C5C;
        }
        #start-battle-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #CD5C5C; }
        #start-battle-btn:disabled { background-color: #ccc; box-shadow: 0 5px 0 #999; cursor: not-allowed; opacity: 0.7; }

        /* 戰鬥畫面樣式 */
        #battle-section {
            max-width: 900px; margin: 0 auto; background: rgba(255, 255, 255, 0.9);
            border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .status-board {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 10px; background: #333; border-radius: 15px; color: white;
        }
        .player-status { width: 40%; text-align: center; }
        .battle-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .vs-text { font-size: 30px; font-weight: bold; color: #FFD700; font-style: italic; }
        
        .hp-bar-bg { width: 100%; height: 25px; background: #555; border: 3px solid #222; border-radius: 15px; overflow: hidden; }
        .hp-fill { width: 100%; height: 100%; background: #32CD32; transition: width 0.3s ease-out; }

        .arena {
            display: flex; justify-content: space-around; align-items: flex-end;
            height: 250px; background: #e0f7fa; border: 4px solid #b2ebf2;
            border-radius: 15px; margin-bottom: 20px; padding-bottom: 20px;
        }
        
        /* 戰鬥角色基礎畫框與動作設定 */
        .battle-sprite {
            width: 150px; height: 150px;
            background-repeat: no-repeat;
            background-size: 300% 300%;
            image-rendering: pixelated; 
            transition: background-position 0.05s, transform 0.1s;
            position: relative;
        }
        .char-idle { background-position: 0% 0%; }       
        .char-hit { background-position: 100% 0%; }      
        .char-attack-1 { background-position: 0% 50%; }  
        .char-attack-2 { background-position: 50% 50%; } 
        .char-item { background-position: 50% 100%; }    
        .char-down { background-position: 100% 100%; }   

        /* 視覺特效 */
        @keyframes blink-red {
            0%, 100% { filter: none; opacity: 1; }
            50% { filter: drop-shadow(0 0 10px red) brightness(1.5); opacity: 0.8; }
        }
        .effect-blink-red { animation: blink-red 0.15s ease-in-out 2; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) scale(1.05); }
            75% { transform: translateX(5px); }
        }
        .effect-attack-shake { animation: shake 0.1s ease-in-out 1; }
        
        #p2-fighter.effect-attack-shake { animation: shake-p2 0.1s ease-in-out 1; }
        @keyframes shake-p2 {
            0%, 100% { transform: scaleX(-1) translateX(0); }
            25% { transform: scaleX(-1) translateX(5px) scale(1.05); }
            75% { transform: scaleX(-1) translateX(-5px); }
        }

        .effect-fade-out { opacity: 0.3; transition: opacity 1s; }

        /* 雙打操作面板 */
        .battle-controls { display: flex; justify-content: space-between; gap: 15px; }
        .player-control { flex: 1; text-align: center; padding: 15px; border-radius: 15px; border: 3px dashed #ccc; }
        .player1-bg { background-color: rgba(135,206,235,0.2); border-color: #87CEEB; }
        .player2-bg { background-color: rgba(255,105,180,0.2); border-color: #FF69B4; }

        .listen-btn {
            font-size: 20px; padding: 12px 30px; margin-bottom: 15px;
            background-color: #FFD700; border: 4px solid #DAA520; color: #333; width: 80%;
        }
        .listen-btn:active { transform: scale(0.95); }
        
        .options-container {
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; min-height: 70px;
        }
        .option-btn {
            font-size: 30px; font-weight: bold; width: 65px; height: 65px;
            background-color: white; border: 3px solid #E27D60; color: #E27D60;
            border-radius: 12px; box-shadow: 0 4px 0 #C35B3E;
        }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #C35B3E; }

        /* 手機版 RWD 縮小規則 */
        @media (max-width: 768px) {
            #character-selection-section { flex-direction: column; }
            .player-setup-box { width: 100%; box-sizing: border-box; }
            .arena { height: 160px; padding-bottom: 10px; margin-bottom: 10px; }
            .battle-sprite { width: 100px; height: 100px; }
            .vs-text { font-size: 20px; }
            .battle-name { font-size: 16px; }
            .hp-bar-bg { height: 18px; }
            .battle-controls { flex-direction: column; gap: 10px; }
            .player-control { padding: 10px; }
            .listen-btn { font-size: 18px; padding: 8px 20px; margin-bottom: 10px; width: 90%; }
            .options-container { min-height: 55px; }
            .option-btn { width: 50px; height: 50px; font-size: 24px; border-width: 2px; }
            .mode-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <h1 id="main-title">字母大對戰</h1>
    
    <div id="letter-selection-section" class="setup-section">
        <h2>第1步：選擇題目範圍</h2>
        <div class="quick-actions">
            <button class="btn quick-btn" onclick="selectAllLetters()">全選 A-Z</button>
            <button class="btn quick-btn" onclick="clearAllLetters()">全部清除</button>
        </div>
        <div id="letter-grid"></div>
    </div>

    <div id="voice-mode-section" class="setup-section">
        <h2>第2步：選擇語音模式</h2>
        <div class="mode-container">
            <button id="mode-simple-btn" class="btn mode-btn selected" onclick="setVoiceMode(false)">⭐ 簡單 (只唸字母)</button>
            <button id="mode-advanced-btn" class="btn mode-btn" onclick="setVoiceMode(true)">🌟 進階 (唸出大小寫)</button>
        </div>
    </div>

    <div id="character-selection-section">
        <div class="player-setup-box player1-box">
            <h2>玩家 1 (天藍色)</h2>
            <div id="p1-preview" class="character-preview">
                <div id="p1-sprite" class="sprite-idle" style="display:none;"></div>
                <div id="p1-placeholder" style="color:#aaa;">請選擇英雄</div>
            </div>
            <div id="p1-char-name" style="text-align:center;font-weight:bold;margin-top:5px;height:20px;"></div>
            <div id="p1-char-grid" class="char-grid"></div>
        </div>

        <div class="player-setup-box player2-box">
            <h2>玩家 2 (熱粉色)</h2>
            <div id="p2-preview" class="character-preview">
                <div id="p2-sprite" class="sprite-idle" style="display:none;"></div>
                <div id="p2-placeholder" style="color:#aaa;">請選擇英雄</div>
            </div>
            <div id="p2-char-name" style="text-align:center;font-weight:bold;margin-top:5px;height:20px;"></div>
            <div id="p2-char-grid" class="char-grid"></div>
        </div>
    </div>

    <div id="setup-bottom-actions" class="bottom-actions">
        <button id="start-battle-btn" class="btn" disabled onclick="startBattle()">
            準備大戰！
        </button>
    </div>

    <div id="battle-section" style="display: none;">
        <div class="status-board">
            <div class="player-status">
                <div id="p1-battle-name" class="battle-name">玩家 1</div>
                <div class="hp-bar-bg"><div id="p1-hp-bar" class="hp-fill"></div></div>
            </div>
            <div class="vs-text">VS</div>
            <div class="player-status">
                <div id="p2-battle-name" class="battle-name">玩家 2</div>
                <div class="hp-bar-bg"><div id="p2-hp-bar" class="hp-fill"></div></div>
            </div>
        </div>

        <div class="arena">
            <div id="p1-fighter" class="battle-sprite char-idle"></div>
            <div id="p2-fighter" class="battle-sprite char-idle" style="transform: scaleX(-1);"></div>
        </div>

        <div class="battle-controls">
            <div id="p1-controls" class="player-control player1-bg">
                <button class="btn listen-btn" ontouchstart="event.preventDefault(); playTurn(1)" onclick="playTurn(1)">🔊 P1 聽題目</button>
                <div id="p1-options" class="options-container"></div>
            </div>
            <div id="p2-controls" class="player-control player2-bg">
                <button class="btn listen-btn" ontouchstart="event.preventDefault(); playTurn(2)" onclick="playTurn(2)">🔊 P2 聽題目</button>
                <div id="p2-options" class="options-container"></div>
            </div>
        </div>
    </div>

    <script>
        // 🌟 如果要改英雄名字，修改這裡的 name: '...' 就可以了！
        const charactersDatabase = [
            { id: 'char01', name: '冒險家', sprite: 'images/heroes/char01.png' },
            { id: 'char02', name: '男術士', sprite: 'images/heroes/char02.png' },
            { id: 'char03', name: '男武道家', sprite: 'images/heroes/char03.png' },
            { id: 'char04', name: '女武道家', sprite: 'images/heroes/char04.png' },
            { id: 'char05', name: '女刺客', sprite: 'images/heroes/char05.png' },
            { id: 'char06', name: '男刺客', sprite: 'images/heroes/char06.png' },
            { id: 'char07', name: '男弓箭手', sprite: 'images/heroes/char07.png' },
            { id: 'char08', name: '女弓箭手', sprite: 'images/heroes/char08.png' },
            { id: 'char09', name: '女騎士', sprite: 'images/heroes/char09.png' },
            { id: 'char10', name: '男騎士', sprite: 'images/heroes/char10.png' },
            { id: 'char11', name: '女術士', sprite: 'images/heroes/char11.png' },
            { id: 'char12', name: '男魔法師', sprite: 'images/heroes/char12.png' },
            { id: 'char13', name: '女魔法師', sprite: 'images/heroes/char13.png' },
            { id: 'char14', name: '見習勇者', sprite: 'images/heroes/char14.png' },
            { id: 'char15', name: '伊賀上忍', sprite: 'images/heroes/char15.png' },
            { id: 'char16', name: '巴爾德', sprite: 'images/heroes/char16.png' },
            { id: 'char17', name: '艾絲梅拉達', sprite: 'images/heroes/char17.png' },
            { id: 'char18', name: '亞米斯', sprite: 'images/heroes/char18.png' },
            { id: 'char19', name: '狄奧尼索斯', sprite: 'images/heroes/char19.png' },
            { id: 'char20', name: '芙洛拉', sprite: 'images/heroes/char20.png' },
            { id: 'char21', name: '月之魔法使', sprite: 'images/heroes/char21.png' },
            { id: 'char22', name: '星焰', sprite: 'images/heroes/char22.png' },
            { id: 'char23', name: '天使莉爾', sprite: 'images/heroes/char23.png' },
            { id: 'char24', name: 'T.B.D', sprite: 'images/heroes/char24.png' },
            { id: 'char25', name: '小白帽布蘭琪', sprite: 'images/heroes/char25.png' }
        ];

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        
        // 遊戲設定狀態 (加入 useCasePrefix 控制語音模式，預設為 false 簡單模式)
        let gameSetup = { 
            letters: [], 
            player1CharId: null, 
            player2CharId: null,
            useCasePrefix: false 
        };

        let battleState = {
            p1Hp: 100, p2Hp: 100,
            p1Target: null, p2Target: null,
            isGameOver: false
        };

        function initSetupMenu() {
            renderLetterGrid(); renderCharacterGrids(); updateStartButtonStatus();
        }

        // 切換語音模式的函數
        function setVoiceMode(usePrefix) {
            gameSetup.useCasePrefix = usePrefix;
            if (usePrefix) {
                document.getElementById('mode-advanced-btn').classList.add('selected');
                document.getElementById('mode-simple-btn').classList.remove('selected');
            } else {
                document.getElementById('mode-simple-btn').classList.add('selected');
                document.getElementById('mode-advanced-btn').classList.remove('selected');
            }
        }

        function renderLetterGrid() {
            const grid = document.getElementById("letter-grid"); grid.innerHTML = "";
            alphabet.forEach(letter => {
                let btn = document.createElement("button");
                btn.className = "btn letter-btn"; btn.innerText = letter; btn.id = "btn-" + letter;
                btn.onclick = () => toggleLetter(letter, btn);
                grid.appendChild(btn);
            });
        }

        function toggleLetter(letter, btn) {
            const index = gameSetup.letters.indexOf(letter);
            if (index === -1) { gameSetup.letters.push(letter); btn.classList.add("selected"); } 
            else { gameSetup.letters.splice(index, 1); btn.classList.remove("selected"); }
            updateStartButtonStatus();
        }

        function selectAllLetters() {
            gameSetup.letters = [...alphabet];
            document.querySelectorAll(".letter-btn").forEach(btn => btn.classList.add("selected"));
            updateStartButtonStatus();
        }

        function clearAllLetters() {
            gameSetup.letters = [];
            document.querySelectorAll(".letter-btn").forEach(btn => btn.classList.remove("selected"));
            updateStartButtonStatus();
        }

        function renderCharacterGrids() {
            const p1Grid = document.getElementById("p1-char-grid"), p2Grid = document.getElementById("p2-char-grid");
            p1Grid.innerHTML = ""; p2Grid.innerHTML = "";
            charactersDatabase.forEach(char => {
                p1Grid.appendChild(createCharItem(char, 1));
                p2Grid.appendChild(createCharItem(char, 2));
            });
        }

        function createCharItem(charData, playerId) {
            const itemDiv = document.createElement("div");
            itemDiv.className = `char-item p${playerId}-char-${charData.id}`;
            itemDiv.onclick = () => selectCharacter(playerId, charData);
            const spriteDiv = document.createElement("div");
            spriteDiv.className = "sprite-idle-mini"; spriteDiv.style.backgroundImage = `url(${charData.sprite})`; 
            itemDiv.appendChild(spriteDiv); return itemDiv;
        }

        function selectCharacter(playerId, charData) {
            if (playerId === 1) {
                gameSetup.player1CharId = charData.id;
                document.getElementById("p1-sprite").style.backgroundImage = `url(${charData.sprite})`;
                document.getElementById("p1-sprite").style.display = "block";
                document.getElementById("p1-placeholder").style.display = "none";
                document.getElementById("p1-char-name").innerText = charData.name;
                document.getElementById("p1-preview").classList.add("has-character");
            } else {
                gameSetup.player2CharId = charData.id;
                document.getElementById("p2-sprite").style.backgroundImage = `url(${charData.sprite})`;
                document.getElementById("p2-sprite").style.display = "block";
                document.getElementById("p2-placeholder").style.display = "none";
                document.getElementById("p2-char-name").innerText = charData.name;
                document.getElementById("p2-preview").classList.add("has-character");
            }
            document.querySelectorAll(`.player${playerId}-box .char-item`).forEach(el => el.classList.remove("selected"));
            document.querySelector(`.p${playerId}-char-${charData.id}`).classList.add("selected");
            updateStartButtonStatus();
        }

        function updateStartButtonStatus() {
            const btn = document.getElementById("start-battle-btn");
            let issues = [];
            if (gameSetup.letters.length < 3) issues.push(`至少選擇3個字母`);
            if (!gameSetup.player1CharId) issues.push("玩家1選角");
            if (!gameSetup.player2CharId) issues.push("玩家2選角");
            if (issues.length === 0) {
                btn.disabled = false; btn.innerText = `準備大戰！`; btn.style.backgroundColor = "#32CD32"; 
            } else {
                btn.disabled = true; btn.innerText = issues[0]; btn.style.backgroundColor = "#ccc";
            }
        }

        function startBattle() {
            gameSetup.letters.sort();
            const p1Char = charactersDatabase.find(c => c.id === gameSetup.player1CharId);
            const p2Char = charactersDatabase.find(c => c.id === gameSetup.player2CharId);

            document.getElementById("main-title").style.display = "none";
            document.getElementById("letter-selection-section").style.display = "none";
            document.getElementById("voice-mode-section").style.display = "none";
            document.getElementById("character-selection-section").style.display = "none";
            document.getElementById("setup-bottom-actions").style.display = "none";

            document.getElementById("battle-section").style.display = "block";

            document.getElementById("p1-battle-name").innerText = p1Char.name;
            document.getElementById("p2-battle-name").innerText = p2Char.name;
            document.getElementById("p1-fighter").style.backgroundImage = `url(${p1Char.sprite})`;
            document.getElementById("p2-fighter").style.backgroundImage = `url(${p2Char.sprite})`;

            speakText("Ready? Fight!", 1, 0.9); 
        }

        // ================= 出題邏輯 (配合語音開關) =================
        function playTurn(playerNum) {
            if (battleState.isGameOver) return;

            const currentTarget = (playerNum === 1) ? battleState.p1Target : battleState.p2Target;

            // 1. 重播目前題目
            if (currentTarget !== null) {
                let voiceText = currentTarget.toUpperCase(); 
                if (gameSetup.useCasePrefix) { // 如果是進階模式，才加上 Big/Small
                    const isUpper = currentTarget === currentTarget.toUpperCase();
                    voiceText = (isUpper ? "Big " : "Small ") + voiceText;
                }
                speakText(voiceText, playerNum, 0.6);
                return; 
            }

            // 2. 產生新題目
            const pool = gameSetup.letters;
            const baseLetter = pool[Math.floor(Math.random() * pool.length)]; 
            
            const isUpperCase = Math.random() >= 0.5; 
            const newTarget = isUpperCase ? baseLetter : baseLetter.toLowerCase();

            if (playerNum === 1) battleState.p1Target = newTarget;
            else battleState.p2Target = newTarget;

            // 根據設定念出新題目
            let voiceText = baseLetter; 
            if (gameSetup.useCasePrefix) {
                voiceText = (isUpperCase ? "Big " : "Small ") + voiceText;
            }
            speakText(voiceText, playerNum, 0.6); 

            let options = [newTarget];
            while (options.length < 3) {
                let rndBase = pool[Math.floor(Math.random() * pool.length)];
                let rndLetter = isUpperCase ? rndBase : rndBase.toLowerCase();
                if (!options.includes(rndLetter)) options.push(rndLetter);
            }
            options.sort(() => Math.random() - 0.5);

            const container = document.getElementById(`p${playerNum}-options`);
            container.innerHTML = ""; 

            options.forEach(letter => {
                let btn = document.createElement("button");
                btn.className = "btn option-btn";
                btn.innerText = letter;
                btn.ontouchstart = (e) => { e.preventDefault(); checkAnswer(playerNum, letter); };
                btn.onclick = () => checkAnswer(playerNum, letter);
                container.appendChild(btn);
            });
        }

        // 判斷答案與動畫演出
        function checkAnswer(playerNum, selectedLetter) {
            if (battleState.isGameOver) return;
            
            const target = (playerNum === 1) ? battleState.p1Target : battleState.p2Target;
            if (!target) return; 

            const container = document.getElementById(`p${playerNum}-options`);
            const p1Fighter = document.getElementById("p1-fighter");
            const p2Fighter = document.getElementById("p2-fighter");

            if (selectedLetter === target) {
                container.innerHTML = ""; 
                
                let attacker, victim, victimHpBar, attackerNum;
                if (playerNum === 1) {
                    attacker = p1Fighter; victim = p2Fighter; attackerNum = 1;
                    victimHpBar = document.getElementById("p2-hp-bar");
                    battleState.p1Target = null;
                } else {
                    attacker = p2Fighter; victim = p1Fighter; attackerNum = 2;
                    victimHpBar = document.getElementById("p1-hp-bar");
                    battleState.p2Target = null;
                }

                speakText("Good Job!", attackerNum, 0.6);

                setTimeout(() => {
                    attacker.classList.replace("char-idle", "char-attack-1");
                    attacker.classList.add("effect-attack-shake");
                    
                    setTimeout(() => {
                        attacker.classList.replace("char-attack-1", "char-attack-2");
                        
                        setTimeout(() => {
                            victim.classList.replace("char-idle", "char-hit");
                            victim.classList.add("effect-blink-red");
                            
                            if (attackerNum === 1) {
                                battleState.p2Hp = Math.max(0, battleState.p2Hp - 10);
                                victimHpBar.style.width = battleState.p2Hp + "%";
                            } else {
                                battleState.p1Hp = Math.max(0, battleState.p1Hp - 10);
                                victimHpBar.style.width = battleState.p1Hp + "%";
                            }
                            
                            checkWin(); 

                            setTimeout(() => {
                                attacker.classList.replace("char-attack-2", "char-idle");
                                attacker.classList.remove("effect-attack-shake");
                                if (!battleState.isGameOver) { 
                                    victim.classList.replace("char-hit", "char-idle");
                                    victim.classList.remove("effect-blink-red");
                                }
                            }, 300);

                        }, 100); 
                    }, 100); 
                }, 800); 

            } else {
                speakText("Oops", playerNum, 0.9);
                
                container.innerHTML = `<div style="color: #d32f2f; font-size: 20px; font-weight: bold; background: #ffebee; padding: 10px; border-radius: 10px; border: 2px solid #ef5350;">
                    答錯囉！<br>答案是 ${target}
                </div>`;

                if (playerNum === 1) battleState.p1Target = null;
                else battleState.p2Target = null;

                setTimeout(() => {
                    if (container.innerHTML.includes("答錯囉")) {
                        container.innerHTML = "";
                    }
                }, 2500);
            }
        }

        function checkWin() {
            if (battleState.p1Hp <= 0 || battleState.p2Hp <= 0) {
                battleState.isGameOver = true;
                let loserFighter, winnerName;
                
                if (battleState.p1Hp <= 0) {
                    loserFighter = document.getElementById("p1-fighter");
                    winnerName = document.getElementById("p2-battle-name").innerText;
                } else {
                    loserFighter = document.getElementById("p2-fighter");
                    winnerName = document.getElementById("p1-battle-name").innerText;
                }

                setTimeout(() => {
                    loserFighter.classList.remove("effect-blink-red");
                    loserFighter.classList.replace("char-hit", "char-down"); 
                    loserFighter.classList.add("effect-fade-out"); 
                    
                    speakText("K O!", 1, 0.7); 

                    setTimeout(() => {
                        alert(`🎉 戰鬥結束！\n🏆 獲勝者是：【${winnerName}】！`);
                    }, 1000);
                }, 200); 
            }
        }

        function speakText(text, playerNum = 1, rate = 0.9) {
            const utterance = new SpeechSynthesisUtterance(text);
            
            if (playerNum === 1) {
                utterance.lang = 'en-US'; 
                utterance.pitch = 1.2; 
                if (rate === 0.6) {
                    utterance.rate = 0.75; 
                } else {
                    utterance.rate = rate; 
                }
            } else {
                utterance.lang = 'en-GB'; 
                utterance.pitch = 0.9;
                utterance.rate = rate; 
            }

            window.speechSynthesis.speak(utterance);
        }

        initSetupMenu();
    </script>
</body>
</html>
