<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>字母對戰遊戲 - 戰鬥場地版</title>
    <style>
        :root {
            --primary-color: #FF7F50;
            --p1-color: #87CEEB; /* 玩家1天藍色 */
            --p2-color: #FF69B4; /* 玩家2熱粉色 */
            --bg-color: #FFF8DC;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            user-select: none;
            overflow-x: hidden;
        }

        h1 { text-align: center; color: #555; font-size: 24px; margin-bottom: 5px; }
        h2 { text-align: center; margin-top: 5px; margin-bottom: 5px; font-size: 18px; }

        /* 通用按鈕樣式 */
        .btn {
            cursor: pointer;
            border-radius: 20px;
            font-weight: bold;
            transition: all 0.2s;
            border: none;
        }

        /* ----- 第一部分：字母選擇介面 ----- */
        #letter-selection-section {
            background: white;
            border-radius: 20px;
            padding: 10px;
            max-width: 600px;
            margin: 0 auto 15px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .quick-actions { text-align: center; margin-bottom: 10px; }
        .quick-btn {
            font-size: 12px;
            padding: 6px 12px;
            margin: 0 3px;
            background-color: #ddd;
            border: 1px solid #ccc;
        }

        #letter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            gap: 8px;
        }

        .letter-btn {
            font-size: 20px;
            padding: 8px 0;
            border: 3px solid #ccc;
            background-color: #f9f9f9;
            color: #ccc;
        }

        .letter-btn.selected {
            background-color: #90EE90;
            border-color: #32CD32;
            color: #006400;
        }

        /* ----- 第二部分：玩家選角介面 (響應式) ----- */
        #character-selection-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .player-setup-box {
            flex: 1;
            min-width: 300px;
            border-radius: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.8);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
        }

        .player1-box { border: 5px solid var(--p1-color); }
        .player2-box { border: 5px solid var(--p2-color); }
        
        @media (max-width: 650px) {
            #character-selection-section { flex-direction: column; }
            .player-setup-box { width: 100%; box-sizing: border-box; }
        }

        /* 大預覽框 */
        .character-preview {
            width: 120px;
            height: 120px;
            background: #eee;
            border-radius: 10px;
            margin: 5px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            border: 2px solid #ccc;
            position: relative;
        }
        
        #p2-preview.has-character #p2-sprite {
            transform: scaleX(-1);
        }

        #p2-preview #p2-sprite[src=""], 
        #p2-preview::after {
            transform: none !important; 
        }

        .sprite-idle {
            width: 120px;
            height: 120px;
            background-repeat: no-repeat;
            background-size: 300% 300%;
            background-position: 0% 0%; 
            image-rendering: pixelated; 
        }

        .char-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 4px;
            margin-top: 10px;
        }

        .char-item {
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 5px;
            overflow: hidden;
            background: white;
            padding: 0;
            aspect-ratio: 1 / 1;
            transition: all 0.2s;
            position: relative;
        }
        
        .char-item .sprite-idle-mini {
            width: 100%;
            height: 100%;
            background-repeat: no-repeat;
            background-size: 300% 300%;
            background-position: 0% 0%;
            image-rendering: pixelated;
        }

        /* 玩家2網格翻轉 */
        #p2-char-grid .sprite-idle-mini {
            transform: scaleX(-1);
        }
        
        .player1-box .char-item.selected {
            border-color: var(--p1-color);
            box-shadow: 0 0 8px rgba(135,206,235,0.7);
        }
        
        .player2-box .char-item.selected {
            border-color: var(--p2-color);
            box-shadow: 0 0 8px rgba(255,105,180,0.7);
        }

        /* 底部確認按鈕 */
        .bottom-actions {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        #start-battle-btn {
            font-size: 24px;
            padding: 12px 50px;
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 5px 0 #CD5C5C;
        }

        #start-battle-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #CD5C5C;
        }
        
        #start-battle-btn:disabled {
            background-color: #ccc;
            box-shadow: 0 5px 0 #999;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* ================= 戰鬥畫面樣式 ================= */
        #battle-section {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* 狀態板與血量條 */
        .status-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            background: #333;
            border-radius: 15px;
            color: white;
        }
        .player-status { width: 40%; text-align: center; }
        .battle-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .vs-text { font-size: 30px; font-weight: bold; color: #FFD700; font-style: italic; }
        
        .hp-bar-bg {
            width: 100%; height: 25px;
            background: #555; border: 3px solid #222; border-radius: 15px;
            overflow: hidden;
        }
        .hp-fill {
            width: 100%; height: 100%;
            background: #32CD32; 
            transition: width 0.3s ease-out;
        }

        /* 競技場 */
        .arena {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 250px;
            background: #e0f7fa;
            border: 4px solid #b2ebf2;
            border-radius: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
        }
        
        .battle-sprite {
            width: 150px; 
            height: 150px;
        }

        /* 底部操作面板 */
        .control-panel { text-align: center; }
        #listen-btn {
            font-size: 24px; padding: 15px 40px; margin-bottom: 15px;
            background-color: #FFD700; border: 4px solid #DAA520; color: #333;
        }
        #listen-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1 id="main-title">字母大對戰</h1>
    
    <div id="letter-selection-section">
        <h2>第1步：選擇題目範圍</h2>
        <div class="quick-actions">
            <button class="btn quick-btn" onclick="selectAllLetters()">全選 A-Z</button>
            <button class="btn quick-btn" onclick="clearAllLetters()">全部清除</button>
        </div>
        <div id="letter-grid"></div>
    </div>

    <div id="character-selection-section">
        <div class="player-setup-box player1-box">
            <h2>玩家 1 (天藍色)</h2>
            <div id="p1-preview" class="character-preview">
                <div id="p1-sprite" class="sprite-idle" style="display:none;"></div>
                <div id="p1-placeholder" style="color:#aaa;">請選擇英雄</div>
            </div>
            <div id="p1-char-name" style="text-align:center;font-weight:bold;margin-top:5px;height:20px;"></div>
            <div id="p1-char-grid" class="char-grid"></div>
        </div>

        <div class="player-setup-box player2-box">
            <h2>玩家 2 (熱粉色)</h2>
            <div id="p2-preview" class="character-preview">
                <div id="p2-sprite" class="sprite-idle" style="display:none;"></div>
                <div id="p2-placeholder" style="color:#aaa;">請選擇英雄</div>
            </div>
            <div id="p2-char-name" style="text-align:center;font-weight:bold;margin-top:5px;height:20px;"></div>
            <div id="p2-char-grid" class="char-grid"></div>
        </div>
    </div>

    <div id="setup-bottom-actions" class="bottom-actions">
        <button id="start-battle-btn" class="btn" disabled onclick="startBattle()">
            請完成設定
        </button>
    </div>

    <div id="battle-section" style="display: none;">
        <div class="status-board">
            <div class="player-status">
                <div id="p1-battle-name" class="battle-name">玩家 1</div>
                <div class="hp-bar-bg"><div id="p1-hp-bar" class="hp-fill"></div></div>
            </div>
            <div class="vs-text">VS</div>
            <div class="player-status">
                <div id="p2-battle-name" class="battle-name">玩家 2</div>
                <div class="hp-bar-bg"><div id="p2-hp-bar" class="hp-fill"></div></div>
            </div>
        </div>

        <div class="arena">
            <div id="p1-fighter" class="sprite-idle battle-sprite"></div>
            <div id="p2-fighter" class="sprite-idle battle-sprite" style="transform: scaleX(-1);"></div>
        </div>

        <div class="control-panel">
            <button id="listen-btn" class="btn">🔊 聽題目 (測試用)</button>
            <div id="answer-options" class="options-container">
                </div>
        </div>
    </div>

    <script>
        const charactersDatabase = [
            { id: 'char01', name: '守護法師', sprite: 'images/heroes/char01.png' },
            { id: 'char02', name: '夜幕刺客', sprite: 'images/heroes/char02.png' },
            { id: 'char03', name: '森林弓手', sprite: 'images/heroes/char03.png' },
            { id: 'char04', name: '爆裂格鬥家', sprite: 'images/heroes/char04.png' },
            { id: 'char05', name: '空手道女郎', sprite: 'images/heroes/char05.png' },
            { id: 'char06', name: '紅蓮魔導士', sprite: 'images/heroes/char06.png' },
            { id: 'char07', name: '皇家騎士', sprite: 'images/heroes/char07.png' },
            { id: 'char08', name: '聖光領主', sprite: 'images/heroes/char08.png' },
            { id: 'char09', name: '暗影獵手', sprite: 'images/heroes/char09.png' },
            { id: 'char10', name: '遊俠小姐', sprite: 'images/heroes/char10.png' },
            { id: 'char11', name: '大地武士', sprite: 'images/heroes/char11.png' },
            { id: 'char12', name: '神秘術士', sprite: 'images/heroes/char12.png' },
            { id: 'char13', name: '風之行者', sprite: 'images/heroes/char13.png' },
            { id: 'char14', name: '冰霜法師', sprite: 'images/heroes/char14.png' },
            { id: 'char15', name: '雷霆劍士', sprite: 'images/heroes/char15.png' },
            { id: 'char16', name: '光之巫女', sprite: 'images/heroes/char16.png' },
            { id: 'char17', name: '毒霧刺客', sprite: 'images/heroes/char17.png' },
            { id: 'char18', name: '狂暴戰士', sprite: 'images/heroes/char18.png' },
            { id: 'char19', name: '狙擊手王', sprite: 'images/heroes/char19.png' },
            { id: 'char20', name: '音樂詩人', sprite: 'images/heroes/char20.png' },
            { id: 'char21', name: '盾之守護者', sprite: 'images/heroes/char21.png' },
            { id: 'char22', name: '機械大師', sprite: 'images/heroes/char22.png' },
            { id: 'char23', name: '馴獸師小姐', sprite: 'images/heroes/char23.png' },
            { id: 'char24', name: '海洋法師', sprite: 'images/heroes/char24.png' },
            { id: 'char25', name: '聖靈祭司', sprite: 'images/heroes/char25.png' }
        ];

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        
        let gameSetup = {
            letters: [],
            player1CharId: null,
            player2CharId: null
        };

        function initSetupMenu() {
            renderLetterGrid();
            renderCharacterGrids();
            updateStartButtonStatus();
        }

        function renderLetterGrid() {
            const grid = document.getElementById("letter-grid");
            grid.innerHTML = "";
            alphabet.forEach(letter => {
                let btn = document.createElement("button");
                btn.className = "btn letter-btn";
                btn.innerText = letter;
                btn.id = "btn-" + letter;
                btn.onclick = () => toggleLetter(letter, btn);
                grid.appendChild(btn);
            });
        }

        function toggleLetter(letter, btn) {
            const index = gameSetup.letters.indexOf(letter);
            if (index === -1) {
                gameSetup.letters.push(letter);
                btn.classList.add("selected");
            } else {
                gameSetup.letters.splice(index, 1);
                btn.classList.remove("selected");
            }
            updateStartButtonStatus();
        }

        function selectAllLetters() {
            gameSetup.letters = [...alphabet];
            document.querySelectorAll(".letter-btn").forEach(btn => btn.classList.add("selected"));
            updateStartButtonStatus();
        }

        function clearAllLetters() {
            gameSetup.letters = [];
            document.querySelectorAll(".letter-btn").forEach(btn => btn.classList.remove("selected"));
            updateStartButtonStatus();
        }

        function renderCharacterGrids() {
            const p1Grid = document.getElementById("p1-char-grid");
            const p2Grid = document.getElementById("p2-char-grid");
            p1Grid.innerHTML = "";
            p2Grid.innerHTML = "";

            charactersDatabase.forEach(char => {
                p1Grid.appendChild(createCharItem(char, 1));
                p2Grid.appendChild(createCharItem(char, 2));
            });
        }

        function createCharItem(charData, playerId) {
            const itemDiv = document.createElement("div");
            itemDiv.className = `char-item p${playerId}-char-${charData.id}`;
            itemDiv.onclick = () => selectCharacter(playerId, charData);
            
            const spriteDiv = document.createElement("div");
            spriteDiv.className = "sprite-idle-mini";
            spriteDiv.style.backgroundImage = `url(${charData.sprite})`; 
            
            itemDiv.appendChild(spriteDiv);
            return itemDiv;
        }

        function selectCharacter(playerId, charData) {
            if (playerId === 1) {
                gameSetup.player1CharId = charData.id;
                document.getElementById("p1-sprite").style.backgroundImage = `url(${charData.sprite})`;
                document.getElementById("p1-sprite").style.display = "block";
                document.getElementById("p1-placeholder").style.display = "none";
                document.getElementById("p1-char-name").innerText = charData.name;
                document.getElementById("p1-preview").classList.add("has-character");
            } else {
                gameSetup.player2CharId = charData.id;
                document.getElementById("p2-sprite").style.backgroundImage = `url(${charData.sprite})`;
                document.getElementById("p2-sprite").style.display = "block";
                document.getElementById("p2-placeholder").style.display = "none";
                document.getElementById("p2-char-name").innerText = charData.name;
                document.getElementById("p2-preview").classList.add("has-character");
            }

            document.querySelectorAll(`.player${playerId}-box .char-item`).forEach(el => el.classList.remove("selected"));
            document.querySelector(`.p${playerId}-char-${charData.id}`).classList.add("selected");

            updateStartButtonStatus();
        }

        function updateStartButtonStatus() {
            const btn = document.getElementById("start-battle-btn");
            
            let issues = [];
            if (gameSetup.letters.length < 3) issues.push(`至少選擇3個字母`);
            if (!gameSetup.player1CharId) issues.push("玩家1選角");
            if (!gameSetup.player2CharId) issues.push("玩家2選角");

            if (issues.length === 0) {
                btn.disabled = false;
                btn.innerText = `準備大戰！`;
                btn.style.backgroundColor = "#32CD32"; 
            } else {
                btn.disabled = true;
                const shortLabel = issues[0].length > 10 ? issues[0].substring(0,8)+"..." : issues[0];
                btn.innerText = shortLabel; 
                btn.style.backgroundColor = "#ccc";
            }
        }

        // ================= 切換戰鬥畫面 =================
        function startBattle() {
            // 1. 整理設定資料
            gameSetup.letters.sort();
            const p1Char = charactersDatabase.find(c => c.id === gameSetup.player1CharId);
            const p2Char = charactersDatabase.find(c => c.id === gameSetup.player2CharId);

            // 2. 隱藏原本的選單畫面和標題
            document.getElementById("main-title").style.display = "none";
            document.getElementById("letter-selection-section").style.display = "none";
            document.getElementById("character-selection-section").style.display = "none";
            document.getElementById("setup-bottom-actions").style.display = "none";

            // 3. 顯示戰鬥畫面
            document.getElementById("battle-section").style.display = "block";

            // 4. 把選好的角色名字，寫到血量條上方
            document.getElementById("p1-battle-name").innerText = p1Char.name;
            document.getElementById("p2-battle-name").innerText = p2Char.name;
            
            // 5. 把選好的角色圖片，放進競技場裡
            document.getElementById("p1-fighter").style.backgroundImage = `url(${p1Char.sprite})`;
            document.getElementById("p2-fighter").style.backgroundImage = `url(${p2Char.sprite})`;

            // 6. 遊戲開始熱血語音
            speakText("Ready? Fight!");
        }
        
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1;
            window.speechSynthesis.speak(utterance);
        }

        // 執行初始化
        initSetupMenu();
    </script>
</body>
</html>
